version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: jorghitotech_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/code
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      DB_NAME: jorghitotech_db
      DB_USER: postgres
      DB_PASSWORD: password
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    command: npm run dev
    volumes:
      - ./frontend:/code
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api

volumes:
  postgres_data:
